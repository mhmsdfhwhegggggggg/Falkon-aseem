kind = "mobile"
previewPath = "/"
title = "FALKON PRO"
version = "1.0.0"
id = "artifacts/falkon-pro"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25769

[services.development]
run = "pnpm --filter @workspace/falkon-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/falkon-pro", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/falkon-pro", "run", "serve" ]

[services.env]
PORT = "25769"
BASE_PATH = "/"
